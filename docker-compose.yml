services:
  api:
    build: ./backend
    environment: { DATABASE_URL: postgres://crm:crm@db:5432/crm, REDIS_URL: redis://redis:6379, JWT_SECRET: local-development-secret-change-me, JWT_REFRESH_SECRET: local-refresh-secret-change-me }
    ports: ["3000:3000"]
    depends_on: { db: { condition: service_healthy }, redis: { condition: service_healthy } }
  db:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: crm, POSTGRES_USER: crm, POSTGRES_PASSWORD: crm }
    healthcheck: { test: ["CMD-SHELL","pg_isready -U crm"], interval: 5s, timeout: 3s, retries: 10 }
    volumes: [pgdata:/var/lib/postgresql/data, ./backend/database/migrations:/docker-entrypoint-initdb.d:ro]
  redis:
    image: redis:7-alpine
    healthcheck: { test: ["CMD","redis-cli","ping"], interval: 5s, timeout: 3s, retries: 10 }
volumes: { pgdata: {} }